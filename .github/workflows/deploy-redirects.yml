name: Deploy Redirect Pages

on:
  push:
    paths:
      - "data/urls.json"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # TODO (Snowflake): When ready, add:
      #   - name: Install Snowflake connector
      #     run: pip install snowflake-connector-python
      # And add SNOWFLAKE_ACCOUNT, SNOWFLAKE_USER, SNOWFLAKE_PASSWORD,
      # SNOWFLAKE_WAREHOUSE to GitHub repo secrets.

      - name: Generate redirect pages
        run: python scripts/generate_redirects.py

      - name: Copy 404 page
        run: cp redirect-site/404.html redirect-site/404.html || true

      # Uncomment and set your custom domain when DNS CNAME is configured:
      # - name: Set custom domain
      #   run: echo "links.kiddom.co" > redirect-site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: redirect-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
