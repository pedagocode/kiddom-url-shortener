<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Not Found — Kiddom</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f8fc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 12px; }
    p { color: #666; font-size: 15px; line-height: 1.6; }
    .footer {
      margin-top: 32px;
      font-size: 13px;
      color: #aaa;
    }
    .footer a { color: #4a90d9; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔗</div>
    <h1>This link has expired or is invalid</h1>
    <p>The resource you're looking for is no longer available at this link. Please ask your teacher for an updated link.</p>
    <div class="footer">
      Powered by <a href="https://www.kiddom.co" target="_blank">Kiddom</a>
    </div>
  </div>
</body>
</html>
